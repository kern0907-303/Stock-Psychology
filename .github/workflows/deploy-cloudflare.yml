name: Deploy NAS decision map

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # The current lockfile has a Linux-only optional native dependency that
      # npm ci rejects on GitHub runners. npm install resolves that optional
      # package before the deterministic build and deploy steps.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npx wrangler deploy --config cloudflare/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
